dtypes:
  - float32 # 实际类型由op_levels决定

shapes:
  - shape: [1024, 1024, 1024]
    op_levels: 0  # Naive f32

  - shape: [1024, 1024, 1024]
    op_levels: 1  # SlicedK f32
    
  - shape: [2048, 2048, 2048]
    op_levels: 2  # Tiled 8x8 BCF f32

  - shape: [2048, 2048, 2048]
    op_levels: 3  # WMMA TF32 Stage 2 f32

  - shape: [2048, 2048, 2048]
    op_levels: 4  # Naive f16

  - shape: [2048, 2048, 2048]
    op_levels: 5  # Tiled 8x8 BCF f16

  - shape: [1024, 1024, 1024]
    op_levels: 6  # MMA TF32 Stage 2 f16
    
  - shape: [1024, 1024, 1024]
    op_levels: 7  # MMA TF32 Stage 1 f16
    