# cases.yaml for Causal Softmax operator
#
# Note:
# - Currently the CUDA kernel is implemented for float32 only.
# - Causal Softmax expects 2D input (batch, seq_len) or 3D (batch, num_heads, seq_len)
# - For 3D input, the kernel treats it as (batch * num_heads, seq_len)

dtypes:
  - float32

shapes:
  # 2D shapes: (batch, seq_len)
  - [8, 16]
  - [16, 32]
  - [32, 64]
  - [4, 128]
  - [8, 256]
  # 3D shapes: (batch, num_heads, seq_len)
  # These will be treated as (batch * num_heads, seq_len) by the CUDA kernel
  - [2, 4, 32]
  - [4, 8, 64]
  - [8, 16, 128]
