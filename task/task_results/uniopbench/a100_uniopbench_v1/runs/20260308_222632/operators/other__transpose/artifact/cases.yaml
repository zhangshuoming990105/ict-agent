dtypes:
  - float32

shapes:
  # Square
  - shape: [1024, 1024]
    op_levels: 0  # f32_col2row
  - shape: [1024, 1024]
    op_levels: 2  # f32x4_col2row
  - shape: [1024, 1024]
    op_levels: 8  # f32x4_shared_col2row
  - shape: [1024, 1024]
    op_levels: 10 # f32x4_shared_bcf_col2row

  # Tall
  - shape: [4096, 1024]
    op_levels: 2
  - shape: [4096, 1024]
    op_levels: 10
    
  # Wide
  - shape: [1024, 4096]
    op_levels: 2
  - shape: [1024, 4096]
    op_levels: 10
    
  # Large
  - shape: [4096, 4096]
    op_levels: 12 # f32x4_shared_bcf_merge_write