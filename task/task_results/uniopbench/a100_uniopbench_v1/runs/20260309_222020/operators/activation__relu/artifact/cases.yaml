# operators/activation/relu/cases.yaml
dtypes:
  - float32
  - float16

shapes:
  # 1024x1024 的四种优化等级
  - shape: [1024, 1024]
    op_levels: 0 # 基础 (Scalar)
  - shape: [1024, 1024]
    op_levels: 1 # 向量化 (F32x4 / F16x2)
  - shape: [1024, 1024]
    op_levels: 2 # 向量化 (F32x4 / F16x8 Unpack)
  - shape: [1024, 1024]
    op_levels: 3 # 向量化 (F32x4 / F16x8 Pack)

  # 4096 (1D) 测试
  - shape: [4096]
    op_levels: 0
  - shape: [4096]
    op_levels: 1
  - shape: [4096]
    op_levels: 2
  - shape: [4096]
    op_levels: 3
    
  # 2048x2048
  - shape: [2048, 2048]
    op_levels: 0
  - shape: [2048, 2048]
    op_levels: 1
  - shape: [2048, 2048]
    op_levels: 2
  - shape: [2048, 2048]
    op_levels: 3