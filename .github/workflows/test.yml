# CI: Unit + integration (mock) must pass; real_api tests run but skip when env not set.
# See docs/testing.md for test roster and levels.
name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv and cache deps
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap

      - name: Install dependencies
        run: uv pip install -e ".[dev]"
        env:
          UV_SYSTEM_PYTHON: 1

      # Unit + integration mock: must pass. real_api tests skip when
      # ICT_AGENT_RUN_REAL_API != "1" (see pytest skipif in integration_real_api).
      - name: Run unit and integration tests
        run: |
          python -m pytest tests/ -v --tb=short
