# cases.yaml
dtypes:
  - float32
  - float16

shapes:
  # Shape: [SeqLen, MaxV, EmbSize]
  
  - shape: [2048, 1024, 512]
    op_levels: 0 # Scalar
  - shape: [2048, 1024, 512]
